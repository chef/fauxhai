name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby: ['3.1', '3.2', '3.4']
    name: Validate JSON on Ruby ${{ matrix.ruby }}
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rake

  validate-diagrams:
    runs-on: ubuntu-latest
    name: Validate Mermaid diagrams
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Mermaid CLI
        run: npm install @mermaid-js/mermaid-cli
      - name: Validate architecture diagrams
        run: ./scripts/validate-mermaid.sh